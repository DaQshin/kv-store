name: Protocol Parse Test

on:
  push:
    paths-ignore:
      - "README.MD"
      - ".gitignore"
      - "Makefile"
      - "docs/**"
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile test
        run: g++ ./tests/protocol/parse.cpp -o parse_test

      - name: Run test
        run: ./parse_test
